name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller==6.10.0

    - name: Install FFmpeg
      run: |
        choco install ffmpeg -y
        echo "$env:ProgramData\chocolatey\bin" >> $env:GITHUB_PATH
      
    - name: Verify FFmpeg
      run: ffmpeg -version
        
    - name: Build executable
      run: |
        python build_exe.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NovelVision-windows-${{ github.run_number }}
        path: |
          dist/NovelVision.exe
          dist/*.zip