name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller==6.10.0

    - name: Install FFmpeg
      run: |
        choco install ffmpeg -y
        # 将 FFmpeg 加入 PATH
        echo "$env:ProgramData\chocolatey\bin" >> $env:GITHUB_PATH
      # 使用 chocolatey 安装，windows-latest 默认有 choco
        
    - name: Verify FFmpeg
      run: ffmpeg -version
        
    - name: Build executable
      run: |
        python build_exe.py
        
    - name: Create Release assets
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cd dist
        $files = Get-ChildItem -Name "*.exe" -Recurse
        foreach ($file in $files) {
            Compress-Archive -Path $file -DestinationPath "NovelVision-$file.zip" -Force
        }
        
    - name: Upload Release assets
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      with:
        files: |
          dist/NovelVision-*.zip
          dist/NovelVision.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}